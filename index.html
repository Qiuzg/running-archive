<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Run Log</title>
    <meta
      name="description"
      content="一个公开展示型的个人Run Log，记录马拉松比赛、日常跑步与年度跑量。"
    />
    <link rel="stylesheet" href="./styles.css?v=20260715-1" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__map" id="heroMap" aria-label="跑步路线地图"></div>
      <div class="hero__map-shade"></div>
      <nav class="topbar" aria-label="主导航">
        <a class="brand" href="#top" aria-label="Run Log首页">
          <span class="brand__mark brand__mark--photo">
            <img src="./assets/profile.png" alt="" />
          </span>
          <span>Run Log</span>
        </a>
        <div class="topbar__links">
          <a href="#" data-panel-tab="routes" class="is-active">路线</a>
          <a href="#" data-panel-tab="races">比赛</a>
          <a href="#" data-panel-tab="stats">统计</a>
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="切换亮暗模式" title="切换亮暗模式">
            <span class="theme-toggle__icon">🌙</span>
          </button>
        </div>
      </nav>
      <div class="summary-strip" id="summaryStrip"></div>
      <div class="hero__panel" id="heroPanel">
        <div class="hero__panel-header">
          <p class="eyebrow" id="panelEyebrow">Route Atlas</p>
          <h2 id="panelTitle">路线足迹</h2>
          <span id="panelSubtitle"></span>
        </div>
        <div class="hero__panel-body" id="heroPanelBody"></div>
      </div>
    </header>

    <script src="./data.generated.js?v=20260710-1"></script>
    <script src="./route-index.generated.js?v=20260710-1"></script>
    <script src="./city-boundaries.generated.js?v=20260710-1"></script>
    <script src="./assets/chart.umd.min.js?v=4.4.0"></script>
    <script src="./app.js?v=20260715-4"></script>
  </body>
</html>
